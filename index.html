<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZimanoAI | AI & Machine Vision</title>
    <!-- Bootstrap 5.3.3 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome 6 (برای آیکون‌ها) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-blue: #0084ff;
        }

        body {
            margin: 0;
            padding: 0;
            /* تصویر پس‌زمینه‌ای که قبلاً برایت ساختم را اینجا قرار بده */
            background: url('industrial-bg.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-header {
            padding: 40px 20px;
        }

        /* استایل اصلی نوار شیشه‌ای */
        .glass-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1300px;
            margin: 0 auto;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* بخش لوگو */
        .brand-section {
            display: flex;
            align-items: center;
            border-left: 1px solid var(--glass-border);
            padding-left: 25px;
            margin-left: 20px;
        }

        .brand-logo {
            width: 50px;
            margin-left: 12px;
        }

        .brand-text h1 {
            color: white;
            font-size: 24px;
            margin: 0;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .brand-text p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            margin: 0;
            text-transform: uppercase;
        }

        /* منوی اصلی */
        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-item {
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
            position: relative;
        }

        .nav-item i {
            display: block;
            color: white;
            font-size: 20px;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .nav-item .fa-lang {
            display: block;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .nav-item .en-text {
            display: block;
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
            margin-top: 2px;
        }

        .nav-item:hover i, .nav-item.active i {
            color: var(--accent-blue);
            opacity: 1;
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 25%;
            width: 50%;
            height: 3px;
            background: var(--accent-blue);
            border-radius: 10px;
        }

        /* دکمه تماس با ما */
        .contact-btn {
            border: 2px solid var(--accent-blue);
            border-radius: 12px;
            padding: 8px 20px;
            text-align: center;
            text-decoration: none;
            background: rgba(0, 132, 255, 0.1);
            transition: 0.3s;
        }

        .contact-btn:hover {
            background: var(--accent-blue);
        }

        .contact-btn span {
            display: block;
            color: white;
            font-size: 14px;
        }

        .contact-btn small {
            color: rgba(255, 255, 255, 0.7);
            font-size: 10px;
        }

        /* بخش زبان */
        .lang-selector {
            color: white;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-right: 15px;
        }
    </style>
</head>
<body>

<header class="main-header">
    <nav class="glass-nav">
        
        <!-- لوگو و عنوان -->
        <div class="brand-section">
            <img src="logositezimanoai.png" alt="Logo" class="brand-logo"> <!-- نام فایل لوگوی خودت را اینجا بذار -->
            <div class="brand-text">
                <h1>ZimanoAI</h1>
                <p>AI & Machine Vision</p>
            </div>
        </div>

        <!-- آیتم‌های منو -->
        <ul class="nav-menu">
            <li>
                <a href="#" class="nav-item active">
                    <i class="fa-solid fa-house"></i>
                    <span class="fa-lang">خانه</span>
                    <span class="en-text">Home</span>
                </a>
            </li>
            <li>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-microchip"></i>
                    <span class="fa-lang">محصولات</span>
                    <span class="en-text">Products</span>
                </a>
            </li>
            <li>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-brain"></i>
                    <span class="fa-lang">هوش مصنوعی</span>
                    <span class="en-text">AI Solutions</span>
                </a>
            </li>
            <li>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-camera"></i>
                    <span class="fa-lang">بینایی ماشین</span>
                    <span class="en-text">Machine Vision</span>
                </a>
            </li>
            <li>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-file-lines"></i>
                    <span class="fa-lang">اخبار و مقالات</span>
                    <span class="en-text">News</span>
                </a>
            </li>
            <li>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-building"></i>
                    <span class="fa-lang">درباره ما</span>
                    <span class="en-text">About Us</span>
                </a>
            </li>
        </ul>

        <!-- بخش سمت چپ (تماس و تغییر زبان) -->
        <div class="d-flex align-items-center">
            <a href="#" class="contact-btn">
                <span>تماس با ما</span>
                <small>Contact Us</small>
            </a>
            
            <div class="lang-selector">
                <i class="fa-solid fa-globe"></i>
                EN <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i>
            </div>
        </div>

    </nav>
</header>

</body>
</html>
