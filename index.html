<!DOCTYPE html>
<html lang="fa" dir="rtl" data-bs-theme="auto">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZimanoAI | هوش مصنوعی و بینایی ماشین</title>
    <link rel="icon" type="image/png" href="logositezimanoai.png">

    <!-- Bootstrap CSS (CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    
    <style>
        /* استایل اختصاصی برای کروسل که قبلا در فایل جدا بود */
        body {
            padding-top: 3rem;
            padding-bottom: 3rem;
            color: rgb(var(--bs-tertiary-color-rgb));
        }
        .carousel {
            margin-bottom: 4rem;
        }
        .carousel-caption {
            bottom: 3rem;
            z-index: 10;
        }
        .carousel-item {
            height: 32rem;
            background-color: #777;
        }
        .marketing .col-lg-4 {
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .marketing h2 {
            font-weight: 400;
        }
        .featurette-divider {
            margin: 5rem 0;
        }
        .featurette-heading {
            font-weight: 300;
            line-height: 1;
            letter-spacing: -.05rem;
        }
        @media (min-width: 40em) {
            .carousel-item { height: 40rem; }
            .featurette-heading { font-size: 50px; }
        }
    </style>
</head>

<body>
    <header data-bs-theme="dark">
        <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">ZimanoAI</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarCollapse">
                    <ul class="navbar-nav me-auto mb-2 mb-md-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="index.html">صفحه اصلی</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="projects.html">پروژه‌ها</a>
                        </li>
                    </ul>

                </div>
            </div>
        </nav>
    </header>

    <main>
        <div id="myCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <div class="container">
                        <div class="carousel-caption text-start">
                            <h1>بینایی ماشین صنعتی</h1>
                            <p>راهکارهای هوشمند مبتنی بر هوش مصنوعی برای کنترل کیفیت خطوط تولید.</p>
                            <p><a class="btn btn-lg btn-primary" href="#">مشاوره رایگان</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="container marketing">
            <div class="row">
                <div class="col-lg-4">
                    <div class="bg-secondary rounded-circle mx-auto" style="width:140px; height:140px;"></div>
                    <h2 class="fw-normal">پردازش تصویر</h2>
                    <p>تشخیص عیوب محصولات با دقت میلی‌متری.</p>
                </div>
            </div>

            <hr class="featurette-divider">

            <div class="row featurette">
                <div class="col-md-7">
                    <h2 class="featurette-heading fw-normal">اتوماسیون هوشمند <span class="text-body-secondary">با PLC و SCADA</span></h2>
                    <p class="lead">یکپارچه‌سازی سیستم‌های هوش مصنوعی با سخت‌افزارهای صنعتی.</p>
                </div>
                <div class="col-md-5">
                    <div class="bg-light" style="width:500px; height:500px; border:1px solid #ddd"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS (CDN) - بسیار مهم برای کار کردن منو و اسلایدر -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
