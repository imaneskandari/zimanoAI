<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZimanoAI | AI & Machine Vision</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg-black:#030508;
--accent-blue:#0084ff;
--glass-border:rgba(255,255,255,0.1);
--text-gray:#888;
}

body{
background:#030508;
color:white;
font-family:'Inter',sans-serif;
padding:20px;
margin:0;
overflow-x:hidden;
}

.header-wrapper{
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.85)),url('headerbackground.png');
background-size:cover;
background-position:center;
border-radius:30px;
border:1px solid var(--glass-border);
min-height:92vh;
display:flex;
flex-direction:column;
}

.glass-nav{
background:rgba(255,255,255,0.03);
backdrop-filter:blur(15px);
border-bottom:1px solid var(--glass-border);
padding:10px 40px;
display:flex;
align-items:center;
justify-content:space-between;
}

.brand-section{
display:flex;
align-items:center;
border-left:1px solid var(--glass-border);
padding-left:20px;
}

.brand-logo{width:45px;margin-left:12px;}

.brand-text h1{
font-size:22px;
margin:0;
font-weight:800;
}

.brand-text p{
color:var(--text-gray);
font-size:10px;
margin:0;
text-transform:uppercase;
}

.nav-menu{
display:flex;
gap:25px;
list-style:none;
margin:0;
padding:0;
}

.nav-item{
text-align:center;
text-decoration:none;
position:relative;
}

/* اصلاح برای آیکون‌های تصویری */
.nav-item img {
display:block;
width:24px;
height:24px;
margin:0 auto 4px auto;
opacity:.7;
transition: .3s;
}

.nav-item i{
display:block;
color:white;
font-size:18px;
margin-bottom:4px;
opacity:.7;
}

.fa-lang{
display:block;
color:white;
font-size:13px;
font-weight:600;
}

.en-text{
display:block;
color:var(--text-gray);
font-size:9px;
}

.nav-item:hover i, .nav-item:hover img{
opacity: 1;
filter: drop-shadow(0 0 5px var(--accent-blue));
}

@media(max-width:992px){
.nav-menu{display:none;}
}

.hamburger-menu-toggle{
position:fixed;
top:20px;
right:20px;
z-index:1001;
background:none;
border:none;
color:white;
font-size:28px;
cursor:pointer;
}

.hamburger-nav-menu{
position:fixed;
top:0;
right:0;
width:75%;
max-width:300px;
height:100vh;
background:#0a0c10;
transform:translateX(100%);
transition:.3s;
z-index:1002;
display:flex;
flex-direction:column;
padding:20px;
}

.hamburger-nav-menu.active{
transform:translateX(0);
}

.hamburger-nav-menu .nav-item{
color:#ccc;
text-decoration:none;
font-size:18px;
padding:15px 10px;
border-bottom:1px solid rgba(255,255,255,0.1);
display:flex;
align-items:center;
justify-content:space-between;
}

.hamburger-nav-menu .nav-item:hover{
color:#0084ff;
}

.close-btn{
background:none;
border:none;
font-size:28px;
color:white;
cursor:pointer;
align-self:flex-start;
margin-bottom:20px;
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:1000;
display:none;
}

#overlay.active{
display:block;
}

body.menu-open{
overflow:hidden;
}
</style>
</head>

<body>

<div class="header-wrapper">

<nav class="glass-nav">

<div class="brand-section">
<img src="logositezimanoai.png" class="brand-logo">
<div class="brand-text">
<h1>ZimanoAI</h1>
<p>AI & Machine Vision</p>
</div>
</div>

<ul class="nav-menu">

<li>
<a href="#" class="nav-item active">
<i class="fa-solid fa-house"></i>
<span class="fa-lang">خانه</span>
<span class="en-text">Home</span>
</a>
</li>

<li>
<a href="#" class="nav-item">
<i class="fa-solid fa-microchip"></i>
<span class="fa-lang">محصولات</span>
<span class="en-text">Products</span>
</a>
</li>

<li>
<a href="#" class="nav-item">
<i class="fa-solid fa-industry"></i>
<span class="fa-lang">اتوماسیون صنعتی، PLC و اسکادا</span>
<span class="en-text">Industrial Automation</span>
</a>
</li>

<li>
<a href="#" class="nav-item">
<i class="fa-solid fa-brain"></i>
<span class="fa-lang">هوش مصنوعی</span>
<span class="en-text">AI Solutions</span>
</a>
</li>

<li>
<a href="#" class="nav-item">
<img src="image_gen_74a1ef5f-da43-4fd6-9b02-e919cfeb0b3b_0.png" alt="Projects">
<span class="fa-lang">پروژه‌های ما</span>
<span class="en-text">Our Projects</span>
</a>
</li>

<li>
<a href="#" class="nav-item">
<i class="fa-solid fa-building"></i>
<span class="fa-lang">درباره ما</span>
<span class="en-text">About Us</span>
</a>
</li>

</ul>

<div class="d-flex align-items-center">

<div class="text-white me-4" style="font-size:13px;cursor:pointer;">
EN <i class="fa-solid fa-globe ms-1"></i>
</div>

<a href="#" class="btn btn-primary">تماس با ما</a>

</div>

</nav>

</div>

<button id="hamburger-menu-toggle" class="hamburger-menu-toggle">
<i class="fas fa-bars"></i>
</button>

<div id="overlay"></div>

<nav id="hamburger-nav-menu" class="hamburger-nav-menu">

<button class="close-btn" id="hamburger-nav-close">
<i class="fas fa-times"></i>
</button>

<a href="#" class="nav-item">
<span>خانه</span>
<i class="fas fa-home"></i>
</a>

<a href="#" class="nav-item">
<span>محصولات</span>
<i class="fas fa-box"></i>
</a>

<a href="#" class="nav-item">
<span>اتوماسیون صنعتی، PLC و اسکادا</span>
<i class="fas fa-industry"></i>
</a>

<a href="#" class="nav-item">
<span>هوش مصنوعی</span>
<i class="fas fa-brain"></i>
</a>

<a href="#" class="nav-item">
<span>پروژه‌های ما</span>
<img src="image_gen_74a1ef5f-da43-4fd6-9b02-e919cfeb0b3b_0.png" style="width:24px; height:24px; margin-right: 10px;" alt="Projects">
</a>

<a href="#" class="nav-item">
<span>درباره ما</span>
<i class="fas fa-building"></i>
</a>

</nav>

<script>

const hamburgerToggle=document.getElementById('hamburger-menu-toggle');
const hamburgerMenu=document.getElementById('hamburger-nav-menu');
const overlay=document.getElementById('overlay');
const hamburgerClose=document.getElementById('hamburger-nav-close');
const body=document.body;

function toggleMenu(){

hamburgerMenu.classList.toggle('active');
overlay.classList.toggle('active');
body.classList.toggle('menu-open');

const icon=hamburgerToggle.querySelector('i');

if(hamburgerMenu.classList.contains('active')){
icon.classList.remove('fa-bars');
icon.classList.add('fa-times');
}else{
icon.classList.remove('fa-times');
icon.classList.add('fa-bars');
}

}

hamburgerToggle.addEventListener('click',toggleMenu);
overlay.addEventListener('click',toggleMenu);
hamburgerClose.addEventListener('click',toggleMenu);

</script>

</body>
</html>
