<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ZimanoAI</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">

<style>

/* ===== پایه ===== */

body{
background:#0b0f19;
color:white;
font-family:tahoma;
}


/* ===== Glass Navbar ===== */

.glass-nav{
background:rgba(15,18,30,0.55);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,0.08);
}


/* ===== Hero ===== */

.hero{

height:100vh;

background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.8)),
url("header-bg.jpg");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
}


/* متن هدر */

.hero h1{
font-size:3rem;
font-weight:700;
}

.hero p{
font-size:1.2rem;
color:#d0d0d0;
margin-top:15px;
margin-bottom:25px;
}


/* دکمه */

.hero-btn{
background:#0d6efd;
border:none;
padding:12px 28px;
border-radius:10px;
box-shadow:0 0 20px rgba(13,110,253,0.6);
}

.hero-btn:hover{
background:#0b5ed7;
}

</style>

</head>
<body>


<!-- Navbar -->

<nav class="navbar navbar-expand-md navbar-dark fixed-top glass-nav">

<div class="container">

<a class="navbar-brand fw-bold" href="#">
ZimanoAI
</a>

<button class="navbar-toggler" type="button"
data-bs-toggle="collapse"
data-bs-target="#nav">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="nav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link active" href="#">خانه</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">پروژه‌ها</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">تماس</a>
</li>

</ul>

</div>

</div>

</nav>



<!-- Header / Hero -->

<header class="hero">

<div class="container">

<div class="row">

<div class="col-lg-6">

<h1>
هوش مصنوعی برای صنعت
</h1>

<p>
راهکارهای بینایی ماشین،
کنترل کیفیت هوشمند
و اتوماسیون صنعتی
</p>

<a href="#" class="btn hero-btn">
مشاوره تخصصی
</a>

</div>

</div>

</div>

</header>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
